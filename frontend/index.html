<div class="hero-section py-5">
<div class="container text-center">

<h1 class="display-5 fw-bold">
Find Your Perfect Engineering College
</h1>

<p class="lead text-muted">
Compare colleges, analyze cutoffs and placements,
and make smarter DSE admission decisions.
</p>

</div>
</div>

<div class="container mt-5">

<h1 class="text-center mb-4">
Admission Support & College Comparison Portal
</h1>

<div class="card p-4 shadow">

<div class="row g-3">

<div class="col-md-6">
<input type="text"
class="form-control"
placeholder="Search College Name">
</div>

<div class="col-md-3">
<select class="form-select">
<option>Select Branch</option>
<option>Computer Engineering</option>
<option>IT</option>
<option>E&TC</option>
<option>Mechanical</option>
<option>Civil</option>
<option>Electrical</option> 
<option>AI/ML</option>
<option>Robotics $ Automation</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-primary w-100">
Search
</button>
</div>

</div>

<hr>

<div class="row g-3">

<div class="col-md-4">
<select class="form-select">
<option>Percentage Range</option>
<option>80-90</option>
<option>90-95</option>
<option>95-99</option>
</select>
</div>

<div class="col-md-4">
<select class="form-select">
<option>College Type</option>
<option>Government</option>
<option>Private</option>
</select>
</div>

<div class="col-md-4">
<select class="form-select">
<option>District</option>
<option>Pune</option>
<option>Mumbai</option>
<option>Nashik</option>
</select>
</div>

</div>

</div>
